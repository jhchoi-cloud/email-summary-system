name: Gmail Daily Summary

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 = KST 09:00
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install google-genai google-auth google-auth-oauthlib google-api-python-client requests

      - name: Gmail 인증 파일 복원
        run: |
          echo "${{ secrets.GMAIL_TOKEN }}" | base64 -d > token.json
          echo "${{ secrets.GMAIL_CREDENTIALS }}" | base64 -d > credentials.json

      - name: 이메일 요약 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_summary.py
